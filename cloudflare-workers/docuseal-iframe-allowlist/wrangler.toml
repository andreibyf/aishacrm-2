# Cloudflare Worker config for docuseal-iframe-allowlist (4VD-7)
#
# Deploy:
#   cd cloudflare-workers/docuseal-iframe-allowlist
#   npx wrangler@latest deploy
#
# After first deploy, bind it to the docuseal.aishacrm.com hostname via the
# `routes` block below. The route runs the Worker on EVERY request (path /*)
# so we can inspect headers and conditionally rewrite them.
#
# Single environment for now — DocuSeal is a SHARED service across dev /
# staging / prod CRM environments, so one Worker covers all three.

name = "docuseal-iframe-allowlist"
main = "src/worker.js"
compatibility_date = "2026-05-01"

# Bind the Worker to the docuseal.aishacrm.com zone. The zone_name must
# match an existing zone in the same Cloudflare account (aishacrm.com).
routes = [
  { pattern = "docuseal.aishacrm.com/*", zone_name = "aishacrm.com" },
]

# No KV / Durable Object / R2 bindings needed — this Worker is purely
# header-rewriting on a passthrough fetch.
