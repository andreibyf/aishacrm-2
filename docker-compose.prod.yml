services:
  # Redis/Valkey - Ephemeral memory layer for agent sessions
  redis-memory:
    image: redis:7-alpine
    container_name: aishacrm-redis-memory
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_memory_data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - default
      - aishanet

  # Redis Cache - API response caching
  redis-cache:
    image: redis:7-alpine
    container_name: aishacrm-redis-cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_cache_data:/data
    command: redis-server --save "" --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Backend API
  backend:
    image: ghcr.io/andreibyf/aishacrm-2-backend:latest
    container_name: aishacrm-backend
    restart: unless-stopped
    depends_on:
      redis-memory:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    ports:
      - "127.0.0.1:4001:3001"
    environment:
      # Doppler injects secrets at runtime via backend entrypoint (doppler run)
      - DOPPLER_TOKEN=${DOPPLER_TOKEN:-${DOPPLER_TOKEN_PROD:-}}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
      - NODE_ENV=production
      - NODE_OPTIONS=${NODE_OPTIONS:---dns-result-order=ipv4first}
      - PUBLIC_SCHEDULER_URL=${PUBLIC_SCHEDULER_URL:-https://scheduler.aishacrm.com}
      # Override Docker network URLs
      - REDIS_URL=redis://redis-memory:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - BRAID_MCP_URL=${BRAID_MCP_URL:-http://braid-mcp-server:8000}
      - MCP_NODE_HEALTH_URL=${MCP_NODE_HEALTH_URL:-http://braid-mcp-server:8000/health}
      - MCP_NODE_ID=${MCP_NODE_ID:-aishacrm-backend-prod}
      # PEP Custom Query — use Groq (no Ollama in prod)
      - PEP_LLM_PROVIDER=groq
      - PEP_LLM_MODEL=llama-3.3-70b-versatile
      # LiteLLM proxy (Docker-internal URL; LITELLM_ENABLED and LITELLM_MASTER_KEY from Doppler)
      - LITELLM_ENABLED=${LITELLM_ENABLED:-false}
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      # Office visualization disabled in production
      - TELEMETRY_ENABLED=false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
      - aishanet

  # Communications worker
  aisha-comms:
    image: ghcr.io/andreibyf/aishacrm-2-backend:latest
    container_name: aishacrm-comms
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis-memory:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    command: ["npm", "run", "worker:communications"]
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN:-${DOPPLER_TOKEN_PROD:-}}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
      - NODE_ENV=production
      - NODE_OPTIONS=${NODE_OPTIONS:---dns-result-order=ipv4first}
      - REDIS_URL=redis://redis-memory:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - CRM_BACKEND_URL=http://backend:3001
      - COMMUNICATIONS_WORKER_POLL_INTERVAL_MS=${COMMUNICATIONS_WORKER_POLL_INTERVAL_MS:-60000}
      - COMMUNICATIONS_WORKER_HEARTBEAT_PATH=/tmp/communications-worker-heartbeat.json
    healthcheck:
      test: [
        "CMD-SHELL",
        "node -e \"const fs=require('fs');const p=process.env.COMMUNICATIONS_WORKER_HEARTBEAT_PATH||'/tmp/communications-worker-heartbeat.json';const configured=Number.parseInt(process.env.COMMUNICATIONS_WORKER_POLL_INTERVAL_MS||'',10);const pollMs=Number.isInteger(configured)&&configured>0?configured:60000;const maxLagMs=Math.max(180000,pollMs*3);const s=fs.statSync(p);process.exit(Date.now()-s.mtimeMs<maxLagMs?0:1)\""
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - default
      - aishanet

  # LiteLLM - AI model proxy and router (OpenAI-compatible API)
  litellm:
    image: ghcr.io/andreibyf/aishacrm-2-litellm:latest
    container_name: aishacrm-litellm
    restart: unless-stopped
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN:-${DOPPLER_TOKEN_PROD:-}}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default
      - aishanet

  # NOTE: MCP server is deployed separately from braid-mcp-node-server/
  # It must be on the 'aishanet' external network to be reachable by backend
  # Container name: braid-mcp-server (or aishacrm-mcp if using legacy setup)
  # Backend connects via BRAID_MCP_URL environment variable

  # Frontend
  frontend:
    image: ghcr.io/andreibyf/aishacrm-2-frontend:latest
    container_name: aishacrm-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4000:3000"  # External port 4000 maps to internal 3000
    environment:
      # Doppler injects secrets at runtime via frontend entrypoint
      - DOPPLER_TOKEN=${DOPPLER_TOKEN:-${DOPPLER_TOKEN_PROD:-}}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
      # Browser-facing runtime overrides (must be host-reachable values)
      - VITE_AISHACRM_BACKEND_URL=${VITE_AISHACRM_BACKEND_URL:-https://api.aishacrm.com}
      - VITE_CALCOM_URL=${VITE_CALCOM_URL:-https://scheduler.aishacrm.com}
      - VITE_OPENREPLAY_PROJECT_KEY=${VITE_OPENREPLAY_PROJECT_KEY:-}
      - VITE_OPENREPLAY_INGEST_POINT=${VITE_OPENREPLAY_INGEST_POINT:-}
      - VITE_OPENREPLAY_DASHBOARD_URL=${VITE_OPENREPLAY_DASHBOARD_URL:-https://replay.aishacrm.com}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # n8n - Workflow automation platform (OPTIONAL - not part of core CRM)
  # To start n8n: docker compose -f docker-compose.prod.yml --profile workflows up -d
  # Access at http://localhost:5679 (via n8n-proxy on production VPS)
  # Used for building custom workflows that can call CRM APIs via webhooks
  n8n:
    image: n8nio/n8n:latest
    container_name: aishacrm-n8n
    restart: unless-stopped
    profiles: [workflows]
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_HOST=0.0.0.0
      - GENERIC_TIMEZONE=UTC
      - N8N_DIAGNOSTICS_ENABLED=false
      # Serve editor under main domain path /n8n to avoid separate subdomain
      - N8N_EDITOR_BASE_URL=https://app.aishacrm.com/n8n
      - N8N_SECURE_COOKIE=false
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      - N8N_HIRING_BANNER_ENABLED=false
      - VUE_APP_URL_BASE_API=https://app.aishacrm.com/n8n
      # Enable Public API for proper REST endpoint authentication
      - N8N_PUBLIC_API_DISABLED=false
      # Enable Basic Auth for iframe embedding (simpler than user management)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # nginx proxy for n8n - strips X-Frame-Options header (external use)
  # Note: n8n is no longer embedded in CRM UI; this proxy remains for potential external iframe embedding
  # To start: docker compose -f docker-compose.prod.yml --profile workflows up -d
  n8n-proxy:
    image: nginx:alpine
    container_name: aishacrm-n8n-proxy
    restart: unless-stopped
    profiles: [workflows]
    depends_on:
      - n8n
    ports:
      - "5679:5679"
    volumes:
      - ./nginx-n8n.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5679/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Dedicated Postgres for Cal.com — isolated from Supabase (no RLS conflicts)
  calcom-db:
    image: postgres:15-alpine
    container_name: aishacrm-calcom-db
    restart: unless-stopped
    profiles: [scheduling]
    networks:
      - aishanet
    environment:
      POSTGRES_USER: ${CALCOM_DB_USER:-calcom}
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
      POSTGRES_DB: ${CALCOM_DB_NAME:-calcom}
    volumes:
      - calcom_db_data:/var/lib/postgresql/data
      # Init script: runs once on fresh volume creation (idempotent backfill)
      - ./scripts/calcom-db-init.sql:/docker-entrypoint-initdb.d/calcom-db-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CALCOM_DB_USER:-calcom}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Cal.com — self-hosted scheduling (requires CALCOM_* secrets in Doppler prd_prd)
  # Start with: doppler run -- docker compose -f docker-compose.prod.yml --profile scheduling up -d
  # Image pinned to known-good digest (2026-04-07). To upgrade: pull new image, verify fixes
  # still apply (Host table, _user_eventtype, ALLOWED_HOSTNAMES), then update digest here.
  calcom:
    image: calcom/cal.com@sha256:0aca8203c51dd7e7e74b71713d028c70f2ae8d58ae987901ac19567dc8d59d98
    container_name: aishacrm-calcom
    restart: unless-stopped
    profiles: [scheduling]
    depends_on:
      calcom-db:
        condition: service_healthy
    networks:
      - aishanet
    environment:
      - DATABASE_URL=postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}
      - DATABASE_DIRECT_URL=postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}
      - NEXTAUTH_SECRET=${CALCOM_NEXTAUTH_SECRET}
      # Canonical external URL used by Cal.com for URL generation and auth callbacks.
      # Must include scheme (https://) to avoid broken asset paths like
      # /scheduler.aishacrm.com/_next/... in browser.
      - CALCOM_PUBLIC_URL=${CALCOM_PUBLIC_URL:-https://scheduler.aishacrm.com}
      - NEXTAUTH_URL=${CALCOM_PUBLIC_URL:-https://scheduler.aishacrm.com}
      # Internal self-reference for server-side calls inside Docker network.
      - NEXTAUTH_URL_INTERNAL=http://calcom:3000
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_WEBAPP_URL=${CALCOM_PUBLIC_URL:-https://scheduler.aishacrm.com}
      # Cal.com parses this as JSON.parse(`[${ALLOWED_HOSTNAMES}]`), so the value
      # must include surrounding double-quotes: "scheduler.aishacrm.com" not scheduler.aishacrm.com
      - ALLOWED_HOSTNAMES=${CALCOM_ALLOWED_HOSTNAMES:-"scheduler.aishacrm.com"}
      - CALCOM_LICENSE_KEY=59c0bed7-8b21-4280-8514-e022fbfc24c7
      - EMAIL_FROM=${CALCOM_EMAIL_FROM:-noreply@aishacrm.com}
      - EMAIL_SERVER_HOST=${CALCOM_SMTP_HOST}
      - EMAIL_SERVER_PORT=${CALCOM_SMTP_PORT:-587}
      - EMAIL_SERVER_USER=${CALCOM_SMTP_USER}
      - EMAIL_SERVER_PASSWORD=${CALCOM_SMTP_PASSWORD}
    ports:
      - "127.0.0.1:3002:3000"
    healthcheck:
      test: ["CMD", "curl", "-fL", "http://localhost:3000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_memory_data:
    driver: local
  redis_cache_data:
    driver: local
  n8n_data:
    driver: local
  calcom_db_data:
    driver: local

networks:
  aishanet:
    external: true
