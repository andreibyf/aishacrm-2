services:
  # Optional local PostgreSQL for migration testing (disabled by default to mirror production Supabase usage)
  db:
    image: postgres:15-alpine
    container_name: aishacrm-db
    restart: "no"
    profiles: [migration-testing]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-changeme_local_dev_only}
      POSTGRES_DB: aishacrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Memory (rename to match production: redis-memory)
  redis-memory:
    image: redis:7-alpine
    container_name: aishacrm-redis-memory
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_memory_data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - aishanet

  # Redis Cache - API response caching
  redis-cache:
    image: redis:7-alpine
    container_name: aishacrm-redis-cache
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_cache_data:/data
    command: redis-server --save "" --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - aishanet

  # Ollama — local LLM server for PEP compiler parser
  ollama:
    image: ollama/ollama:latest
    container_name: aishacrm-ollama
    restart: unless-stopped
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull llama3.2:3b && ollama pull qwen2.5-coder:3b && ollama run llama3.2:3b 'ready' && wait"
    environment:
      - OLLAMA_NUM_CTX=1024
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=2
    ports:
      - "11436:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - aishanet

  # Backend API (mirrors production layout, local build)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        USE_SYSTEM_CHROMIUM: "true"
        PUPPETEER_SKIP_DOWNLOAD: "1"
    container_name: aishacrm-backend
    restart: unless-stopped
    depends_on:
      redis-memory:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "4001:3001"  # Host:Container - prod port 4001 maps to dev port 3001
    env_file:
      - .env.local
    environment:
      # DOPPLER_TOKEN from .env (not committed to git)
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=aishacrm
      - DOPPLER_CONFIG=dev_personal
      - NODE_ENV=development
      - NODE_OPTIONS=${NODE_OPTIONS:---dns-result-order=ipv4first}
      # PORT=3001 set by Doppler (container internal port)
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4000}
      - PGSSLMODE=require
      - REDIS_URL=redis://redis-memory:6379
      # GitHub tokens loaded from .env.local (not overridden here)
      - REDIS_CACHE_URL=redis://redis-cache:6379
      # BACKEND_PORT=3001 set by Doppler (container internal port)
      - SYSTEM_TENANT_ID=a11dfb63-4b18-4eb8-872e-747af2e37c46
      - TENANT_RESOLVE_CACHE_TTL_MS=${TENANT_RESOLVE_CACHE_TTL_MS:-300000}
      - BRAID_MCP_URL=http://braid-mcp-server:8000
      - MCP_NODE_HEALTH_URL=http://braid-mcp-server:8000/health
      # AI_TRIGGERS_WORKER_ENABLED loaded from Doppler
      - MCP_NODE_ID=aishacrm-backend
      - DEFAULT_TENANT_ID=a11dfb63-4b18-4eb8-872e-747af2e37c46
      - CRM_BACKEND_URL=http://backend:3001
      # Supabase credentials (fallback if Doppler fails - from .env)
      - SUPABASE_URL=${SUPABASE_URL:-https://efzqxjpfewkrgpdootte.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # LLM_PROVIDER and API keys loaded from Doppler in entrypoint
      # GitHub Issues integration - loaded from .env.local
      - REPO_OWNER=${REPO_OWNER:-andreibyf}
      - REPO_NAME=${REPO_NAME:-aishacrm-2}
      # C.A.R.E. (Cognitive Adaptive Response Engine) Configuration loaded from Doppler:
      #   AI_TRIGGERS_WORKER_ENABLED, AI_TRIGGERS_WORKER_INTERVAL_MS
      #   CARE_STATE_WRITE_ENABLED, CARE_WORKFLOW_TRIGGERS_ENABLED
      #   CARE_AUTONOMY_ENABLED, CARE_SHADOW_MODE
      # PEP LLM Parser
      - LOCAL_LLM_BASE_URL=http://ollama:11434/v1
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-ollama}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PEP_LLM_PROVIDER=groq
      - PEP_LLM_MODEL=llama-3.3-70b-versatile
      - SUMMARY_LLM_MODEL=llama3.2:3b
      # Telemetry
      - TELEMETRY_ENABLED=true
      - TELEMETRY_LOG_PATH=/telemetry/telemetry.ndjson
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
        tag: "{{.Name}}"
    volumes:
      - aisha_telemetry:/telemetry
      # SECURITY WARNING: Docker socket mount is a privilege escalation risk
      # Grants backend API control over host Docker daemon. Only use in trusted environments.
      # Required for: Ollama container restart from AI Settings UI (superadmin only)
      # NOTE: Current backend Dockerfile doesn't include Docker CLI - restart will fail with ENOENT
      # TODO: Consider moving restart functionality to a separate locked-down admin service
      - /var/run/docker.sock:/var/run/docker.sock  # enables Ollama restart from AI Settings UI
      - ./docker-compose.yml:/app/docker-compose.yml  # mounts compose file for Ollama settings edits
    networks:
      - aishanet

  aisha-comms:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        USE_SYSTEM_CHROMIUM: "true"
        PUPPETEER_SKIP_DOWNLOAD: "1"
    container_name: aishacrm-comms
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis-memory:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    command: ["npm", "run", "worker:communications"]
    env_file:
      - .env.local
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=aishacrm
      - DOPPLER_CONFIG=dev_personal
      - NODE_ENV=development
      - NODE_OPTIONS=${NODE_OPTIONS:---dns-result-order=ipv4first}
      - PGSSLMODE=require
      - REDIS_URL=redis://redis-memory:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - SYSTEM_TENANT_ID=a11dfb63-4b18-4eb8-872e-747af2e37c46
      - TENANT_RESOLVE_CACHE_TTL_MS=${TENANT_RESOLVE_CACHE_TTL_MS:-300000}
      - DEFAULT_TENANT_ID=a11dfb63-4b18-4eb8-872e-747af2e37c46
      - CRM_BACKEND_URL=http://backend:3001
      - SUPABASE_URL=${SUPABASE_URL:-https://efzqxjpfewkrgpdootte.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - COMMUNICATIONS_WORKER_POLL_INTERVAL_MS=${COMMUNICATIONS_WORKER_POLL_INTERVAL_MS:-60000}
      - COMMUNICATIONS_WORKER_HEARTBEAT_PATH=/tmp/communications-worker-heartbeat.json
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('fs');const p=process.env.COMMUNICATIONS_WORKER_HEARTBEAT_PATH||'/tmp/communications-worker-heartbeat.json';const s=fs.statSync(p);process.exit(Date.now()-s.mtimeMs<180000?0:1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
        tag: "{{.Name}}"
    networks:
      - aishanet

  # Cal.com - Self-hosted booking & scheduling system
  # Start with: docker compose --profile scheduling up -d
  # Access at http://localhost:3002 (or scheduling.aishacrm.com via reverse proxy)

  # Dedicated Postgres for Cal.com — isolated from the AiSHA Supabase database.
  # Cal.com runs its own Prisma migrations and schema; sharing AiSHA's DB is not supported.
  calcom-db:
    image: postgres:15-alpine
    container_name: aishacrm-calcom-db
    restart: unless-stopped
    profiles: [scheduling]
    networks:
      - aishanet
    environment:
      POSTGRES_USER: ${CALCOM_DB_USER:-calcom}
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
      POSTGRES_DB: ${CALCOM_DB_NAME:-calcom}
    volumes:
      - calcom_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CALCOM_DB_USER:-calcom}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  calcom:
    image: calcom/cal.com:latest
    container_name: aishacrm-calcom
    restart: unless-stopped
    profiles: [scheduling]
    depends_on:
      calcom-db:
        condition: service_healthy
    networks:
      - aishanet
    environment:
      # Defaults to the bundled calcom-db container. Override CALCOM_DATABASE_URL in
      # Doppler/env to point at an external DB (e.g. a separate Supabase project).
      - DATABASE_URL=${CALCOM_DATABASE_URL:-postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}}
      # For local/direct Postgres (no pooler) both URLs are the same.
      # Set CALCOM_DATABASE_DIRECT_URL separately only when using PgBouncer.
      - DATABASE_DIRECT_URL=${CALCOM_DATABASE_DIRECT_URL:-${CALCOM_DATABASE_URL:-postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}}}
      - NEXTAUTH_SECRET=${CALCOM_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${CALCOM_NEXTAUTH_URL:-http://localhost:3002}
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - EMAIL_FROM=${CALCOM_EMAIL_FROM:-noreply@aishacrm.com}
      - EMAIL_SERVER_HOST=${CALCOM_SMTP_HOST}
      - EMAIL_SERVER_PORT=${CALCOM_SMTP_PORT:-587}
      - EMAIL_SERVER_USER=${CALCOM_SMTP_USER}
      - EMAIL_SERVER_PASSWORD=${CALCOM_SMTP_PASSWORD}
      - NEXT_PUBLIC_WEBAPP_URL=${CALCOM_NEXTAUTH_URL:-http://localhost:3002}
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: MCP is now provided by braid-mcp-node-server's own docker-compose.yml
  # with braid-mcp-server (coordinator) + braid-mcp-1, braid-mcp-2 (worker nodes)
  # Run: cd braid-mcp-node-server && docker compose up -d

  # Frontend (Vite dev server for development, or built static for production-like testing)
  frontend:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://efzqxjpfewkrgpdootte.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-sb_publishable_6AFc_XdEzOF0SAE6ivUL2A_fpdZZdBq}
        VITE_AISHACRM_BACKEND_URL: ${VITE_AISHACRM_BACKEND_URL:-http://localhost:4001}
        VITE_CURRENT_BRANCH: ${VITE_CURRENT_BRANCH:-main}
        APP_BUILD_VERSION: ${APP_BUILD_VERSION:-dev-local}
        VITE_SYSTEM_TENANT_ID: ${VITE_SYSTEM_TENANT_ID:-a11dfb63-4b18-4eb8-872e-747af2e37c46}
        VITE_USER_HEARTBEAT_INTERVAL_MS: ${VITE_USER_HEARTBEAT_INTERVAL_MS:-90000}
      dockerfile: Dockerfile
    container_name: aishacrm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4000:3000"  # External port 4000 maps to internal 3000
    env_file:
      - .env
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=aishacrm
      - DOPPLER_CONFIG=dev_personal
      - PORT=${FRONTEND_PORT:-3000}
      # Supabase credentials (fallback if Doppler fails)
      - VITE_SUPABASE_URL=https://efzqxjpfewkrgpdootte.supabase.co
      - VITE_SUPABASE_ANON_KEY=sb_publishable_6AFc_XdEzOF0SAE6ivUL2A_fpdZZdBq
      - VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_6AFc_XdEzOF0SAE6ivUL2A_fpdZZdBq
      - VITE_AISHACRM_BACKEND_URL=http://localhost:4001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
        tag: "{{.Name}}"
    networks:
      - aishanet

  # n8n - Workflow automation platform (OPTIONAL - not part of core CRM)
  # To start n8n: docker compose --profile workflows up -d
  # Access at http://localhost:5679 (via n8n-proxy) or http://localhost:5678 (direct)
  # Used for building custom workflows that can call CRM APIs via webhooks
  n8n:
    image: n8nio/n8n:latest
    container_name: aishacrm-n8n
    restart: unless-stopped
    profiles: [workflows]
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_HOST=0.0.0.0
      - GENERIC_TIMEZONE=UTC
      - N8N_DIAGNOSTICS_ENABLED=false
      # Allow iframe embedding in CRM
      - N8N_EDITOR_BASE_URL=http://localhost:5679
      - N8N_SECURE_COOKIE=false
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      # Disable frame-ancestors CSP to allow iframe embedding
      - N8N_HIRING_BANNER_ENABLED=false
      - VUE_APP_URL_BASE_API=http://localhost:5679
      # Enable Public API for proper REST endpoint authentication
      - N8N_PUBLIC_API_DISABLED=false
      # Load custom MCP node
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom
      # Enable Basic Auth for iframe embedding (simpler than user management)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-nodes-mcp:/home/node/.n8n/custom:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - aishanet

  # nginx proxy for n8n - strips X-Frame-Options header for iframe embedding (external use)
  # Note: n8n is no longer embedded in CRM UI; this proxy remains for potential external iframe embedding
  # To start: docker compose --profile workflows up -d
  n8n-proxy:
    image: nginx:alpine
    container_name: aishacrm-n8n-proxy
    restart: unless-stopped
    profiles: [workflows]
    depends_on:
      - n8n
    ports:
      - "5679:5679"
    volumes:
      - ./nginx-n8n.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5679/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aishanet

volumes:
  postgres_data:
    driver: local
  calcom_db_data:
    driver: local
  n8n_data:
    driver: local
  redis_memory_data:
    driver: local
  redis_cache_data:
    driver: local
  ollama_data:
    driver: local
  aisha_telemetry:
    external: true

networks:
  aishanet:
    name: aishanet
    driver: bridge
