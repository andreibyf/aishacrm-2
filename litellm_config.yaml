model_list:
  # Pass-through: any explicit provider/model call from existing code
  - model_name: openai/*
    litellm_params:
      model: openai/*
      api_key: 'os.environ/OPENAI_API_KEY'
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*
      api_key: 'os.environ/ANTHROPIC_API_KEY'
  - model_name: groq/*
    litellm_params:
      model: groq/*
      api_key: 'os.environ/GROQ_API_KEY'

  # AI Cloud Server — Qwen2.5-14B via vLLM (Tailscale: 100.81.132.118)
  - model_name: local/*
    litellm_params:
      model: openai/*
      api_base: 'os.environ/LOCAL_LLM_BASE_URL'
      api_key: 'os.environ/LOCAL_LLM_API_KEY'

  - model_name: local/qwen2.5-14b
    litellm_params:
      model: 'openai//home/aisha/models/Qwen2.5-14B-Instruct-AWQ'
      api_base: 'os.environ/LOCAL_LLM_BASE_URL'
      api_key: 'os.environ/LOCAL_LLM_API_KEY'

  # The backend maps provider 'local' -> 'ollama/<model>' before calling
  # LiteLLM (backend/lib/aiEngine/litellmClient.js:12), so the same vLLM server
  # must also be reachable under the ollama/* names. Without these the
  # ollama/* fallback (router_settings below) would divert local summaries to
  # groq instead of the local server. Mirrors the local/* routes above.
  - model_name: ollama/*
    litellm_params:
      model: openai/*
      api_base: 'os.environ/LOCAL_LLM_BASE_URL'
      api_key: 'os.environ/LOCAL_LLM_API_KEY'

  - model_name: ollama/qwen2.5-14b
    litellm_params:
      model: 'openai//home/aisha/models/Qwen2.5-14B-Instruct-AWQ'
      api_base: 'os.environ/LOCAL_LLM_BASE_URL'
      api_key: 'os.environ/LOCAL_LLM_API_KEY'

router_settings:
  num_retries: 2
  timeout: 300
  fallbacks:
    - 'anthropic/*': ['openai/*']
    - 'openai/*': ['groq/*']
    - 'ollama/*': ['groq/*']

litellm_settings:
  json_logs: true
  set_verbose: false
  # Uncomment for persistent spend tracking (Phase 2):
  # success_callback: ["langfuse"]
  # database_url: os.environ/LITELLM_DB_URL

general_settings:
  master_key: 'os.environ/LITELLM_MASTER_KEY'
  store_model_in_db: false
