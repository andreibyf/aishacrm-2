# Prod MCP / Braid — Coolify-native build target on Hetzner.
#
# Phase 2 controlled-promotion migration for the MCP/Braid service group.
# Mirrors staging/04-braid/docker-compose.yml, but uses prd_prd Doppler config
# and the production aishanet external Docker network.
#
# Deploy model:
#   - Coolify Application "prod-mcp" on the `Prod` / Hetzner server points at
#     the mirrored repo source and this compose file.
#   - Deploy must be manual promotion only. Do NOT enable deploy-on-every-main.
#   - The legacy/prod backend reaches MCP through BRAID_MCP_URL, defaulting to
#     http://braid-mcp-server:8000 in docker-compose.prod.yml.
#   - This compose claims the same stable Docker DNS aliases on aishanet.
#
# Cutover model:
#   - If a legacy braid-mcp container is currently claiming braid-mcp-server on
#     aishanet, keep it running until this stack is provisioned and validated in
#     an alternate/non-conflicting test path OR stop it immediately before the
#     Coolify deployment.
#   - Do not allow two healthy containers to claim the same production DNS alias
#     unless the intent is explicit round-robin testing.
#
# Coolify v4 path rule:
#   Build context is `braid-mcp-node-server` because Coolify invokes compose
#   with the cloned repo root as --project-directory. Do not use ../../ paths.

services:
  braid-mcp-server:
    image: aishacrm-mcp:coolify
    build:
      context: braid-mcp-node-server
      dockerfile: Dockerfile
    container_name: prod-braid-mcp-server
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - NODE_ENV=production
      - MCP_ROLE=server
      - PORT=8000
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
      - CRM_BACKEND_URL=http://backend:3001
      - REDIS_URL=redis://redis-memory:6379
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-a11dfb63-4b18-4eb8-872e-747af2e37c46}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 120s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      aishanet:
        aliases:
          - braid-mcp-server

  braid-mcp-1:
    image: aishacrm-mcp:coolify
    build:
      context: braid-mcp-node-server
      dockerfile: Dockerfile
    container_name: prod-braid-mcp-1
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 384m
    mem_reservation: 192m
    depends_on:
      braid-mcp-server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MCP_ROLE=node
      - MCP_NODE_ID=prod-1
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
      - MCP_SERVER_URL=http://braid-mcp-server:8000
      - CRM_BACKEND_URL=http://backend:3001
      - REDIS_URL=redis://redis-memory:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 120s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      aishanet:
        aliases:
          - braid-mcp-1

  braid-mcp-2:
    image: aishacrm-mcp:coolify
    build:
      context: braid-mcp-node-server
      dockerfile: Dockerfile
    container_name: prod-braid-mcp-2
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 384m
    mem_reservation: 192m
    depends_on:
      braid-mcp-server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MCP_ROLE=node
      - MCP_NODE_ID=prod-2
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-prd_prd}
      - MCP_SERVER_URL=http://braid-mcp-server:8000
      - CRM_BACKEND_URL=http://backend:3001
      - REDIS_URL=redis://redis-memory:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 120s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      aishanet:
        aliases:
          - braid-mcp-2

networks:
  # External production network shared with docker-compose.prod.yml.
  # Do not let Coolify recreate it.
  aishanet:
    external: true
