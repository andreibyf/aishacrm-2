name: AiSHA Autonomous Improvements

on:
  schedule:
    - cron: "0 3 * * *"   # nightly
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run validation baseline
        run: npm run validate

      - name: Run improvement agent
        run: node automation/run-improvements.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-autonomous-improvements
          commit-message: "AI: autonomous improvements"
          title: "Autonomous code improvements"
          body: |
            Automated improvement pass.

            Generated by AiSHA Autonomous Improvement Agent.