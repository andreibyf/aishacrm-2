# Claude Code Action — AI-powered PR/issue assistance.
# Triggered by '@claude' mentions in PR/issue comments, by labels, or by
# review submissions. Uses ANTHROPIC_API_KEY from GitHub repo secrets.
#
# What it does (per anthropics/claude-code-action@v1):
#   - Mention '@claude' in any issue or PR comment → it reads context and replies
#   - Open an issue with body containing '@claude' → it analyzes and may open a PR
#   - Submit a PR review → can be configured to auto-summarize / suggest changes
#
# Why GitHub-hosted runner instead of self-hosted (the AISHA-4VDATA on user's
# laptop): the action installs Bun + Claude Code CLI under Linux assumptions;
# the self-hosted runner is Windows. ubuntu-latest on GitHub-free tier (2000
# min/mo on private repos) is enough for review workloads at our volume.
#
# Cost: pay-per-token from your Anthropic account (no flat fee).
# Replaces: GitHub Copilot subscription for PR-review use case.

name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]
  pull_request:
    # Auto-review on every new PR (without needing @claude mention)
    types: [opened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Skip on bot-authored events to avoid loops
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so Claude can read prior commits

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # default trigger_phrase is '@claude' — keep it
          # 'use_sticky_comment: true' makes Claude update one comment per
          # PR/issue instead of spamming new ones across multiple events
          use_sticky_comment: true
