name: RLS Verification

on:
  push:
    paths:
      - 'backend/migrations/**'
      - 'backend/scripts/checks/check-rls-ci.js'
      - 'backend/scripts/checks/check-rls-simple.js'
  workflow_dispatch: {}

# Explicit least-privilege permissions
permissions:
  contents: read

jobs:
  check-rls:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Node.js setup
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run CI RLS check
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run ci:check-rls
