# Docker Compose for VPS-2 (147.189.168.164)
# Non-core AiSHA services migrated from VPS-1 to reduce CPU load
# Deploy with: docker compose -f docker-compose.vps2.yml up -d

services:
  # Cal.com PostgreSQL database
  calcom-db:
    image: postgres:15-alpine
    container_name: aishacrm-calcom-db
    restart: unless-stopped
    networks:
      - aishanet
    # 5432 must be reachable from VPS-1's backend so the tenant-integrations and
    # calcom-sync routes can run their auto-provisioning queries (createCalcomUser,
    # ensureCalcomEventType, ensureCalcomWebhook, etc — see backend/lib/calcomDb.js
    # and backend/routes/tenant-integrations.js). The public port mapping is the
    # short-term fix; the long-term plan is to put VPS-1 ↔ VPS-2 traffic on a
    # private mesh (Tailscale/Wireguard) and revert this back to internal-only.
    # Lock down with UFW on VPS-2 to allow port 5432 only from VPS-1's IP
    # (147.189.173.237) — see scripts/ufw-vps2.sh in repo root once added.
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${CALCOM_DB_USER:-calcom}
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
      POSTGRES_DB: ${CALCOM_DB_NAME:-calcom}
    volumes:
      - calcom_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CALCOM_DB_USER:-calcom}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Cal.com scheduling service
  # Pinned to v6.2.0 (released 2026-03-02) — same digest staging proved out.
  # Why pinned (not :latest): modern Docker (28.2+) rejects the legacy v1
  # manifest schema that v5-era cal.com images shipped with. The v5 pin
  # `0aca8203...` only kept working on VPS-2 because the image was cached;
  # any `docker image prune` would have broken prod calcom. v6.2.0 ships
  # an OCI v2 manifest. To upgrade further: pull new digest, validate
  # Host table + _user_eventtype + ALLOWED_HOSTNAMES against this config,
  # then update the @sha256 below.
  calcom:
    image: calcom/cal.com@sha256:ace3bb1219fb7306585ab9f4d94d41af7ee064c343db0498173436bbe857bd49
    container_name: aishacrm-calcom
    deploy:
      resources:
        limits:
          cpus: '2.0'  # More headroom on VPS-2
    # `$$VAR` (double-dollar) escapes Compose's variable interpolation so the
    # literal `$VAR` reaches `sh -c`, which expands it against the CONTAINER's
    # env at runtime. Compose interpolation happens at render time against the
    # HOST env / .env file, where these vars are not defined — using `$VAR`
    # there silently expanded to empty strings and the substitution was a no-op
    # (left 767 instances of http://localhost:3000 in the bundle, surfacing as
    # the "login redirects to localhost:3000" symptom in 2026-04 outage).
    command: ["sh", "-c", "scripts/replace-placeholder.sh $$BUILT_NEXT_PUBLIC_WEBAPP_URL $$NEXT_PUBLIC_WEBAPP_URL && npx prisma migrate deploy --schema /calcom/packages/prisma/schema.prisma && yarn start"]
    restart: unless-stopped
    depends_on:
      calcom-db:
        condition: service_healthy
    networks:
      - aishanet
    environment:
      - DATABASE_URL=postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}
      - DATABASE_DIRECT_URL=postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}
      - NEXTAUTH_SECRET=${CALCOM_NEXTAUTH_SECRET}
      - CALCOM_PUBLIC_URL=${CALCOM_PUBLIC_URL:-https://scheduler.aishacrm.com}
      - NEXTAUTH_URL=${CALCOM_PUBLIC_URL:-https://scheduler.aishacrm.com}
      - NEXTAUTH_URL_INTERNAL=http://calcom:3000
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_WEBAPP_URL=${CALCOM_PUBLIC_URL:-https://scheduler.aishacrm.com}
      # The `calcom/cal.com:latest` image bakes BUILT_NEXT_PUBLIC_WEBAPP_URL=http://localhost:3000
      # into the static Next.js bundle at build time. The replace-placeholder.sh
      # script in `command:` swaps that for NEXT_PUBLIC_WEBAPP_URL on every start,
      # but it needs both vars present in the container env. Hardcoding the FROM
      # value here matches the upstream image and survives image bumps that keep
      # the same default placeholder.
      - BUILT_NEXT_PUBLIC_WEBAPP_URL=http://localhost:3000
      # Cal.com parses this as `JSON.parse('[' + ALLOWED_HOSTNAMES + ']')`, so the
      # value MUST contain the literal double-quote characters. YAML single-quote
      # wrap preserves them verbatim. Compose `${VAR:-default}` interpolation
      # strips inner double-quotes from the default expression, so we hardcode the
      # value rather than templating it. To override, edit this line directly.
      - 'ALLOWED_HOSTNAMES="scheduler.aishacrm.com"'
      - CALCOM_LICENSE_KEY=59c0bed7-8b21-4280-8514-e022fbfc24c7
      - EMAIL_FROM=${CALCOM_EMAIL_FROM:-noreply@aishacrm.com}
      - EMAIL_SERVER_HOST=${CALCOM_SMTP_HOST}
      - EMAIL_SERVER_PORT=${CALCOM_SMTP_PORT:-587}
      - EMAIL_SERVER_USER=${CALCOM_SMTP_USER}
      - EMAIL_SERVER_PASSWORD=${CALCOM_SMTP_PASSWORD}
    # No host port mapping. cloudflared on VPS-2 (added below) reaches calcom
    # through the docker-internal aishanet network at http://calcom:3000.
    # Re-add `ports: - "3002:3000"` only if you need to access calcom directly
    # from VPS-1 again (e.g., during a tunnel outage).
    healthcheck:
      test: ["CMD", "curl", "-fL", "http://localhost:3000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Ollama local LLM server
  ollama:
    image: ollama/ollama:latest
    container_name: aishacrm-ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
    networks:
      - aishanet
    ports:
      - "11434:11434"  # Expose for LiteLLM on VPS-1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # cloudflared connector for tunnel ecff23d3-890e-4bea-b59e-aacbafae4b9c
  # ("aishacrm-vps2"). Routes scheduler.aishacrm.com -> http://calcom:3000 over
  # the docker-internal aishanet network, eliminating the public-IP HTTP hop
  # that VPS-1's old tunnel used to do (scheduler.aishacrm.com -> 147.189.168.164:3002).
  # No healthcheck — cloudflared image is distroless (no shell), so the standard
  # CMD-SHELL pattern errors. cloudflared exits cleanly on persistent connection
  # failure and Docker's restart-policy retries; that's the upstream-recommended
  # pattern. TUNNEL_TOKEN_VPS2 lives in /opt/aishacrm/.env, sourced from Doppler
  # prd_prd. To rotate: rotate in Cloudflare dashboard -> update Doppler ->
  # `docker compose up -d --force-recreate cloudflared`.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: aishacrm-cloudflared-vps2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
    # `--protocol http2` forces TCP-based HTTP/2 transport instead of the default
    # QUIC over UDP. On budget VPS networks (Zap included), upstream NAT/firewall
    # devices time out idle UDP flows after ~30-60s, causing all 4 tunnel
    # connections to fail simultaneously with "no recent network activity" and
    # users seeing scheduler.aishacrm.com flap (down for ~8s while reconnecting).
    # HTTP/2 has built-in TCP keepalives and survives NAT idle timeouts cleanly.
    # Cost: minor latency overhead vs QUIC (TCP handshake + slow-start), but for
    # tunnel control-plane traffic it's negligible.
    command: tunnel --no-autoupdate --protocol http2 --metrics 0.0.0.0:2000 run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN_VPS2}
    networks:
      - aishanet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Hawser - Docker monitoring for Dockhand visibility.
  # Switched from ghcr.io/finsys/hawser:latest to mjohnsongp/hawser:latest in
  # 2026-04 because finsys image fails on Docker 29.x (rejects the newer Engine
  # API version returned by the host). The mjohnsongp community fork carries
  # the API-version compat fix. Container name kept at aishacrm-hawser-vps2 on
  # VPS-2 (live container is named `hawser` because the live compose uses that
  # short name — repo aligns to live).
  hawser:
    image: mjohnsongp/hawser:latest
    container_name: hawser
    restart: unless-stopped
    networks:
      - aishanet
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HAWSER_TOKEN=${HAWSER_TOKEN_VPS2}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  aishanet:
    driver: bridge

volumes:
  calcom_db_data:
    driver: local
  ollama_data:
    driver: local
