# Gitea — self-hosted Git host on VPS-2 (Services tier).
# Replaces OneDev for Coolify-native CI/CD (Coolify v4 has built-in Gitea
# webhook integration; OneDev never did).
#
# Topology:
#   browser → Cloudflare → cloudflared (aishacrm-vps2 tunnel) →
#     coolify-proxy (Traefik :443) → this gitea container :3000
#
# Persistence:
#   /data         → /var/lib/gitea (repos, attachments, avatars, config)
#   sqlite db at  /data/gitea/gitea.db (single-user/solopreneur scale; can
#                 migrate to Postgres later by changing DB_TYPE/HOST)
#
# Coolify v4 quirks applied (per litellm/braid lessons):
#   - Service name `gitea` + alias `gitea` on the Coolify per-app network
#     (Coolify auto-generates the network; coolify-proxy joins it).
#   - SERVICE_FQDN_GITEA=https://gitea.aishacrm.com → Coolify auto-generates
#     traefik routers; do NOT add manual traefik.* labels (caused 504s on
#     staging when both my labels + Coolify's auto labels claimed the same
#     Host).
#   - Container port 3000 (Gitea HTTP). Coolify reads EXPOSE from Dockerfile.
#   - mem_limit: 512m (Gitea idle ~150MB; head-room for git-pack ops).

services:
  gitea:
    image: gitea/gitea:1.22
    container_name: vps2-gitea
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__DOMAIN=gitea.aishacrm.com
      - GITEA__server__ROOT_URL=https://gitea.aishacrm.com/
      - GITEA__server__SSH_DOMAIN=gitea.aishacrm.com
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__START_SSH_SERVER=true
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=true
      - GITEA__webhook__ALLOWED_HOST_LIST=deploy.aishacrm.com,*.aishacrm.com,private,external
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__log__LEVEL=Info
      - GITEA__log__MODE=console
      - SERVICE_FQDN_GITEA=https://gitea.aishacrm.com
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:2222:2222"
    volumes:
      - gitea_data:/data

volumes:
  gitea_data:
    driver: local
