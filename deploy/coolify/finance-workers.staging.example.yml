# =============================================================================
# Finance Ops — STAGING Worker Compose (Phase 3-4 deliverable)
# =============================================================================
# Source spec: docs/architecture/finance/staging-worker-deployment-log.md (3-4)
# Companion (all-three-worker design template): deploy/coolify/finance-workers.example.yml (2C-5)
#
# THIS FILE IS A REVIEWED, DEPLOYABLE-TODAY TEMPLATE for the STAGING projection
# worker only. It is intentionally NOT referenced by any Coolify app, CI job,
# or docker-compose invocation by the Phase 3-4 task. Copying it into a Coolify
# app on VPS-1 is a separately authorized operator action gated by Phase 3-4 §6.
#
# Difference from the 2C-5 all-three-worker template
# (deploy/coolify/finance-workers.example.yml):
#
#   * Projection worker only. finance-audit-worker is deferred until the audit
#     pack request host (audit_pack_requests) and a standalone audit worker
#     module exist. finance-adapter-worker is deferred until adapter Slice 2 +
#     ERPNext sandbox proof (2C-9). The 2C-5 template retains the three-worker
#     design intent; this file is the tighter subset that matches what's
#     actually implemented in backend/workers/ today.
#
#   * Healthcheck reconciled to the worker's actual heartbeat surface. The
#     worker writes a JSON heartbeat to a file (FINANCE_PROJECTION_WORKER_HEARTBEAT_PATH,
#     default /tmp/finance-projection-worker-heartbeat.json). It does NOT bind
#     an HTTP port — the 2C-5 template's `wget http://127.0.0.1:9090/health` check
#     would fail because no such HTTP server exists in backend/workers/financeProjectionWorker.js.
#     The healthcheck below checks for the file's existence and a recent mtime.
#     (See staging-worker-deployment-log.md §5.1 and §8.2.)
#
#   * Staging Doppler config is explicit (DOPPLER_CONFIG=stg_stg). Production
#     deployment is not in scope for Phase 3.
#
# Disabled-by-default posture (finance-worker-deployment-config.md §3.1):
#   The worker runs ONLY when all three are true:
#     ENABLE_FINANCE_OPS=true  &&  ENABLE_FINANCE_WORKERS=true  &&  ENABLE_FINANCE_PROJECTION_WORKER=true
#   All three are hard-set to "false" below. As written, this file starts a
#   process that immediately logs "[finance-projection-worker] disabled — idling"
#   and never opens a DB connection, polls nothing, claims nothing, calls no
#   provider.
#
# Tenant scope: FINANCE_CONTROLLED_TENANT_IDS is REQUIRED to be explicitly set
# (comma-separated UUID list) before the worker processes anything. Empty/unset
# means NO tenants (the poll cycle iterates zero tenants — a no-op). There is
# NO implicit "process all tenants" fall-through; this is enforced by
# parseControlledTenantIds() in backend/workers/financeProjectionWorker.js:89.
#
# Placement: VPS-1 (Zap-Hosting staging, 147.189.173.237, SSH user andreibyf,
# Coolify server UUID f7uzrwlbqjtx6qamppma5xsz) per docs/architecture/DEPLOY_TOPOLOGY.md.
# NEVER VPS-2 (control plane only — Coolify, Cal.com, Uptime Kuma, Gitea, OneDev).
# Production (Hetzner) is out of scope for Phase 3.
#
# ENABLE_FINANCE_PERSISTENT_EVENTS: shown false for env-parity clarity. The
# worker code does NOT read this flag (buildProjectionRunner unconditionally
# uses createFinancePgEventStore). It is a backend-route constraint only —
# backend/routes/finance.v2.js:48 refuses to mount when this flag is true.
# Lifting that guard is gated on projection-backed reads landing in Slice 2.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # finance-projection-worker — hosts the Projection Runtime Runner.
  # Slice 1 Task 5 (commit fe745500). See projection-worker-staging-plan.md (2C-6)
  # and worker-service-topology.md (2B-13) for the upstream design.
  # ---------------------------------------------------------------------------
  finance-projection-worker:
    image: aishacrm-backend:coolify
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: staging-finance-projection-worker
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 512m
    mem_reservation: 192m
    # Matches the npm script registered in backend/package.json:
    #   "worker:finance-projection": "node workers/financeProjectionWorker.js"
    command: ['doppler', 'run', '--', 'npm', 'run', 'worker:finance-projection']
    environment:
      # ── Doppler — staging only ──
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - NODE_ENV=production

      # ── Three-tier enable gate — ALL three must be the literal string 'true'
      #    for the worker to start its poll loop. Any one not equal to 'true'
      #    (unset / 'TRUE' / '1' / boolean true) ⇒ the worker logs
      #    "[finance-projection-worker] disabled — idling" and never opens a
      #    DB connection. Enforced by isFinanceProjectionWorkerEnabled() in
      #    backend/workers/financeProjectionWorker.js:69.
      - ENABLE_FINANCE_OPS=false
      - ENABLE_FINANCE_WORKERS=false
      - ENABLE_FINANCE_PROJECTION_WORKER=false

      # ── Event-store persistence gate (Slice 1 / Phase 3-1 §7) ──
      #    The worker does NOT read this flag — buildProjectionRunner
      #    unconditionally uses createFinancePgEventStore. Set here for env
      #    parity with the backend app, which structurally refuses to mount
      #    the finance v2 route when this is 'true' (split-brain prevention,
      #    backend/routes/finance.v2.js:48). The fail-closed guard is lifted
      #    in Slice 2 once projection-backed reads land.
      - ENABLE_FINANCE_PERSISTENT_EVENTS=false

      # ── Controlled-tenant allow-list — REQUIRED to be explicitly set ──
      #    Comma-separated UUIDs of tenants the worker processes. Empty/unset
      #    ⇒ NO tenants processed (poll cycle iterates zero tenants — no-op).
      #    There is NO implicit "process all" fall-through; tenants must be
      #    explicitly listed. Phase 3-5 will set this to the controlled
      #    staging tenant a11dfb63-4b18-4eb8-872e-747af2e37c46.
      #    Enforced by parseControlledTenantIds() in
      #    backend/workers/financeProjectionWorker.js:89.
      - FINANCE_CONTROLLED_TENANT_IDS=

      # ── Polling / batching ──
      - FINANCE_WORKER_POLL_INTERVAL_MS=${FINANCE_WORKER_POLL_INTERVAL_MS:-5000}
      - FINANCE_WORKER_BATCH_SIZE=${FINANCE_WORKER_BATCH_SIZE:-100}
      - FINANCE_PROJECTION_TENANT_BATCH=${FINANCE_PROJECTION_TENANT_BATCH:-25}

      # ── DB connection (Doppler-injected; REQUIRED AT PROCESS STARTUP) ──
      #    The entry block at backend/workers/financeProjectionWorker.js:378-383
      #    resolves FINANCE_DB_URL || DATABASE_URL and exits the process if
      #    neither is set — BEFORE the disabled gate at line 257 runs. So a
      #    disabled-by-default deploy still needs the connection string in
      #    Doppler stg_stg just to start the container. The pg.Pool object is
      #    then constructed (lazily — no TCP connection opens at construction);
      #    the disabled gate returns before any pool.query() is called, so no
      #    actual DB connection is opened in the disabled state.
      - FINANCE_DB_URL=${FINANCE_DB_URL:-}
      - FINANCE_DB_POOL_MAX=${FINANCE_DB_POOL_MAX:-5}
      - FINANCE_DB_STATEMENT_TIMEOUT_MS=${FINANCE_DB_STATEMENT_TIMEOUT_MS:-30000}

      # ── Heartbeat / observability ──
      #    Worker writes a JSON heartbeat to this path on every poll-cycle
      #    completion (writeWorkerHeartbeat in the worker). Schema:
      #      { status, updated_at, pid, poll_interval_ms, tenant_count,
      #        success_count, failure_count, event_count }
      #    Default path is /tmp/... — keep that for now; the healthcheck below
      #    asserts existence + recency. When the worker is in the disabled-
      #    and-idling state, no heartbeat is written (the disabled path is a
      #    one-line log + early return), so the healthcheck is expected to
      #    report unhealthy in that state. That is acceptable — Coolify still
      #    shows the container as `running` and the disabled state is
      #    intentional. A follow-up to emit a one-time "disabled" heartbeat
      #    on the idle path is tracked separately (staging-worker-deployment-log.md §8.2).
      - FINANCE_PROJECTION_WORKER_HEARTBEAT_PATH=/tmp/finance-projection-worker-heartbeat.json
      - FINANCE_WORKER_HEARTBEAT_MS=${FINANCE_WORKER_HEARTBEAT_MS:-15000}
      - FINANCE_WORKER_LOG_LEVEL=${FINANCE_WORKER_LOG_LEVEL:-info}

    # Heartbeat-file healthcheck. Asserts the heartbeat file exists and was
    # written within the last 45 seconds (3× the default 15 s heartbeat
    # interval). Replaces the 2C-5 template's HTTP check, which would fail
    # because the worker binds no HTTP port.
    healthcheck:
      test:
        - 'CMD-SHELL'
        - |
          test -f /tmp/finance-projection-worker-heartbeat.json && \
          test "$(($(date +%s) - $(stat -c %Y /tmp/finance-projection-worker-heartbeat.json 2>/dev/null || echo 0)))" -lt 45
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

    networks:
      aishanet:
        aliases:
          - staging-finance-projection-worker

# ─────────────────────────────────────────────────────────────────────────────
# NOT included in this file (deferred from Phase 3-4 — see
# staging-worker-deployment-log.md §4):
#
#   finance-audit-worker
#     Standalone audit worker module is NOT implemented. Audit-timeline
#     projection upkeep is currently handled in-process by the projection
#     worker (auditTimelineProjection is registered in buildProjectionRunner
#     with includeInfrastructureEvents: true — backend/workers/financeProjectionWorker.js:194).
#     A standalone audit worker awaits the audit_pack_requests host (a
#     carried-forward engineering prerequisite per production-readiness-review.md
#     2C-15) and a separate worker-creation pass.
#
#   finance-adapter-worker
#     Adapter worker module is NOT implemented. Adapter execution is gated on
#     Phase 3 Slice 2 (adapter implementation + ERPNext sandbox proof per
#     erpnext-sandbox-proof.md 2C-9). The 2C-8 adapter-worker sandbox plan is
#     design-only.
#
# Adding either service to this file is forbidden until both the entry module
# and the corresponding npm script exist in backend/. The 2C-5 design template
# (deploy/coolify/finance-workers.example.yml) retains the three-worker shape
# for future reference and is the source of truth when those workers are built.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  aishanet:
    external: true
    name: aishanet
