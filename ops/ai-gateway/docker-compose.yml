# AI Gateway: Tailscale egress proxy so staging/prod LiteLLM can reach the home AI
# box (vLLM + Ollama) over the tailnet. Design, rationale, and deploy steps live in
# README.md in this directory. Kept comment-light on purpose: Coolify's compose
# reader shells the file, so shell metacharacters in comments break the repo-read.

services:
  ai-gateway:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:crm --hostname=${TS_GATEWAY_HOSTNAME:-ai-gateway}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ai-gateway-state:/var/lib/tailscale
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      aishanet:
        aliases:
          - ai-gateway

  ai-gw-vllm:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:ai-gateway"
    command: TCP-LISTEN:8000,fork,reuseaddr TCP:100.81.132.118:8000
    depends_on:
      - ai-gateway

  ai-gw-ollama:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:ai-gateway"
    command: TCP-LISTEN:11434,fork,reuseaddr TCP:100.81.132.118:11434
    depends_on:
      - ai-gateway

volumes:
  ai-gateway-state:

networks:
  aishanet:
    external: true
    name: ${AISHANET_NAME}
