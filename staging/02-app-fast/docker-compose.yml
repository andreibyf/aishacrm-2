# Staging - Group 2: app-fast (frontend + comms worker)
# Both Coolify-native, share the build context with backend (uses backend image
# for comms via different command), join staging-aishanet for inter-service DNS.
#
# Service-name choices (must match what existing code/Doppler expect):
#   - frontend   -> alias [frontend], traefik routes staging-app.aishacrm.com
#   - aisha-comms -> alias [aisha-comms]; matches manual stack convention
#                    (NOT `comms` - the prior compose had this wrong)
#
# Dependency: backend (in staging-backend-heavy) must be deployed first so
# comms has a target for its REST/CRM heartbeats. Browser traffic to frontend
# also needs backend at staging-api.aishacrm.com.

services:
  frontend:
    # Pull pre-built image from GHCR. Build args (VITE_*) are baked at CI build
    # time via .github/workflows/build-staging.yml; runtime entrypoint
    # (frontend-entrypoint.sh) populates env-config.js from container env so
    # runtime overrides are still honored.
    # Migrated from in-place `build:` block on 2026-05-05.
    image: ghcr.io/andreibyf/aishacrm-2-frontend:staging-latest
    container_name: staging-aishacrm-frontend
    restart: unless-stopped
    # Aggregate CPU/mem slice — see staging/01-backend-heavy comments.
    cgroup_parent: aishacrm.slice
    ports:
      - "127.0.0.1:5000:3000"
    mem_limit: 256m
    mem_reservation: 128m
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - PORT=3000
      - VITE_AISHACRM_BACKEND_URL=https://staging-api.aishacrm.com
      - VITE_CALCOM_URL=https://staging-scheduler.aishacrm.com
      - VITE_OPENREPLAY_ENABLED=${VITE_OPENREPLAY_ENABLED:-false}
      - VITE_OPENREPLAY_PROJECT_KEY=${VITE_OPENREPLAY_PROJECT_KEY:-}
      - VITE_OPENREPLAY_INGEST_POINT=${VITE_OPENREPLAY_INGEST_POINT:-}
      - VITE_OPENREPLAY_DASHBOARD_URL=${VITE_OPENREPLAY_DASHBOARD_URL:-}
      - SERVICE_FQDN_FRONTEND=https://staging-app.aishacrm.com
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      staging-aishanet:
        aliases:
          - frontend

  aisha-comms:
    # Reuses the backend image with a different `command:`. Pulls from GHCR.
    # Migrated from in-place `build:` block on 2026-05-05.
    image: ghcr.io/andreibyf/aishacrm-2-backend:staging-latest
    container_name: staging-aishacrm-comms
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 768m
    mem_reservation: 256m
    command: ["npm", "run", "worker:communications"]
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - NODE_ENV=production
      - NODE_OPTIONS=${NODE_OPTIONS:---max-old-space-size=512 --dns-result-order=ipv4first}
      - REDIS_URL=redis://redis-memory:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - CRM_BACKEND_URL=http://aishacrm-backend:3001
      - COMMUNICATIONS_WORKER_POLL_INTERVAL_MS=${COMMUNICATIONS_WORKER_POLL_INTERVAL_MS:-60000}
      - COMMUNICATIONS_WORKER_HEARTBEAT_PATH=/tmp/communications-worker-heartbeat.json
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const fs=require('fs');const p=process.env.COMMUNICATIONS_WORKER_HEARTBEAT_PATH||'/tmp/communications-worker-heartbeat.json';const c=Number.parseInt(process.env.COMMUNICATIONS_WORKER_POLL_INTERVAL_MS||'',10);const pollMs=Number.isInteger(c)&&c>0?c:60000;const maxLagMs=Math.max(180000,pollMs*3);const s=fs.statSync(p);process.exit(Date.now()-s.mtimeMs<maxLagMs?0:1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      staging-aishanet:
        aliases:
          - aisha-comms

networks:
  staging-aishanet:
    external: true
    name: aishacrm_aishanet-staging
