# Staging - Group 1: backend
# Service: aishacrm-backend (Coolify-native build from OneDev)
#
# Redis (memory + cache) intentionally NOT in this compose - they remain
# managed by the manual docker-compose.staging.yml stack on Staging.
# Reason: Redis volumes hold session/cache state that Coolify would relabel.
# Backend connects to manual redis via DNS aliases redis-memory / redis-cache
# on the shared external network aishacrm_aishanet-staging.
#
# Applies all 9 Coolify v4 quirks captured during the litellm + braid migrations:
#   1. context: . (NOT ../..) - Coolify --project-directory artifact root
#   2. Service name `backend` + DNS alias `aishacrm-backend` (Doppler
#      stg_stg.CRM_BACKEND_URL bakes in the latter; both must resolve)
#   3. Network alias decouples DNS from Coolify's auto-generated container_name
#   4. Network `staging-aishanet` maps to host network `aishacrm_aishanet-staging`
#   5. mem_limit 3072m (matches prod cap, leaves build headroom)
#   6. Doppler stg_stg config
#   7. depends_on: not used here - redis is external (manual stack)
#   8. healthcheck on /health
#   9. log rotation (json-file 10m x 3)

services:
  backend:
    image: aishacrm-backend:coolify
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: staging-aishacrm-backend
    restart: unless-stopped
    # Bind to host-level aggregate CPU/mem slice. Without cgroup_parent the
    # backend can saturate all available cores; aishacrm.slice enforces
    # CPUQuota=500% across the full staging stack so the aggregate stays under
    # Zap VPS-1's 5.5-core sustained cap. Slice must be installed on the host
    # (scripts/aishacrm.slice → /etc/systemd/system/aishacrm.slice).
    cgroup_parent: aishacrm.slice
    ports:
      - "127.0.0.1:5001:3001"
    mem_limit: 3072m
    mem_reservation: 1024m
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - NODE_ENV=production
      - NODE_OPTIONS=${NODE_OPTIONS:---dns-result-order=ipv4first}
      - REDIS_URL=redis://redis-memory:6379
      - REDIS_CACHE_URL=redis://redis-cache:6379
      - BRAID_MCP_URL=http://braid-mcp-server:8000
      - MCP_NODE_HEALTH_URL=http://braid-mcp-server:8000/health
      - MCP_NODE_ID=staging-aishacrm-backend
      - LITELLM_BASE_URL=http://litellm:4000
      - CRM_BACKEND_URL=http://aishacrm-backend:3001
      - CALCOM_DB_URL=postgresql://${CALCOM_DB_USER:-calcom}:${CALCOM_DB_PASSWORD}@calcom-db:5432/${CALCOM_DB_NAME:-calcom}
      - CALCOM_WEBHOOK_BACKEND_URL=http://aishacrm-backend:3001
      - PUBLIC_SCHEDULER_URL=${PUBLIC_SCHEDULER_URL:-https://staging-scheduler.aishacrm.com}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://staging-app.aishacrm.com}
      - PEP_LLM_PROVIDER=groq
      - PEP_LLM_MODEL=llama-3.3-70b-versatile
      - TELEMETRY_ENABLED=false
      - SERVICE_FQDN_BACKEND=https://staging-api.aishacrm.com
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      # 60s interval: user-facing API; balance failure detection vs dockerd churn.
      # Reduced from 30s → 60s on 2026-05-06 after VPS-1 lockup investigation
      # showed 56k+ healthcheck-driven docker exec events in 4h were saturating
      # system.slice CPU. See 4VD-24.
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      staging-aishanet:
        aliases:
          - backend
          - aishacrm-backend

networks:
  # External network shared with manual stack and Coolify-managed siblings
  # (litellm, braid). Compose ref `staging-aishanet` -> host network
  # `aishacrm_aishanet-staging`.
  staging-aishanet:
    external: true
    name: aishacrm_aishanet-staging
