# Staging MCP — Coolify-native build target on Staging server (VPS-1).
#
# Mirror of `prod/02-mcp/docker-compose.yml` (created next). Same 3-container
# distributed pattern (server + 2 workers) as prod, with stg_stg Doppler config
# and the staging-aishanet external network.
#
# Applies all 9 Coolify v4 quirks discovered during the litellm migration:
#
# 1. context: `braid-mcp-node-server` (NOT `../../braid-mcp-node-server`).
#    Coolify v4 invokes compose with `--project-directory <artifacts-root>`
#    and resolves relative paths against THAT, not the compose file's dir.
#
# 2. Service names AT CUTOVER claim canonical `braid-mcp-server` etc. that the
#    GHCR sibling used to own. Backend BRAID_MCP_URL=http://braid-mcp-server:8000
#    service name `braid-mcp-server` on aishanet-staging — RETIRED post-cutover).
#    resolves to the new container with no env-var change. Stop + retire GHCR
#    sibling (`aishacrm-braid-mcp-staging`) before redeploy.
#
# 3. Explicit network alias decouples DNS from Coolify's auto-generated
#    container_name with embedded app UUID.
#
# 4. Network `staging-aishanet` maps to host network
#    `aishacrm_aishanet-staging` via `name:` directive.
#
# 5. mem_limits per service:
#    - braid-mcp-server: 512m (coordinator does the most work)
#    - braid-mcp-1, braid-mcp-2: 384m each (workers, lighter)
#
# 6. Doppler stg_stg config matches existing GHCR sibling — same secrets.
#
# 7. depends_on with service_healthy ensures workers wait for server.
#
# 8. healthcheck on /health for orchestration.
#
# 9. log rotation set (json-file driver, 10m x 3) to prevent disk fill.

services:
  braid-mcp-server:
    # Pull pre-built image from GHCR. Migrated from in-place `build:` block
    # on 2026-05-05 (eliminates build CPU on VPS-1).
    image: ghcr.io/andreibyf/aishacrm-2-mcp:staging-latest
    container_name: staging-braid-mcp-server
    restart: unless-stopped
    # Aggregate CPU/mem slice — see staging/01-backend-heavy comments.
    cgroup_parent: aishacrm.slice
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - NODE_ENV=production
      - MCP_ROLE=server
      - PORT=8000
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - CRM_BACKEND_URL=http://backend:3001
      - REDIS_URL=redis://redis-memory:6379
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-a11dfb63-4b18-4eb8-872e-747af2e37c46}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      staging-aishanet:
        aliases:
          - braid-mcp-server

  braid-mcp-1:
    # Same image as braid-mcp-server (different MCP_ROLE env). Pulled from GHCR.
    image: ghcr.io/andreibyf/aishacrm-2-mcp:staging-latest
    container_name: staging-braid-mcp-1
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 384m
    mem_reservation: 192m
    depends_on:
      braid-mcp-server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MCP_ROLE=node
      - MCP_NODE_ID=staging-1
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - MCP_SERVER_URL=http://braid-mcp-server:8000
      - CRM_BACKEND_URL=http://backend:3001
      - REDIS_URL=redis://redis-memory:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      staging-aishanet:
        aliases:
          - braid-mcp-1

  braid-mcp-2:
    # Same image as braid-mcp-server (different MCP_ROLE env). Pulled from GHCR.
    image: ghcr.io/andreibyf/aishacrm-2-mcp:staging-latest
    container_name: staging-braid-mcp-2
    restart: unless-stopped
    cgroup_parent: aishacrm.slice
    mem_limit: 384m
    mem_reservation: 192m
    depends_on:
      braid-mcp-server:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MCP_ROLE=node
      - MCP_NODE_ID=staging-2
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
      - MCP_SERVER_URL=http://braid-mcp-server:8000
      - CRM_BACKEND_URL=http://backend:3001
      - REDIS_URL=redis://redis-memory:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      staging-aishanet:
        aliases:
          - braid-mcp-2

networks:
  # External network shared with manually-deployed staging stack. Internal
  # compose ref `staging-aishanet`, actual host network name from
  # docker-compose.staging.yml is project-prefixed `aishacrm_aishanet-staging`.
  staging-aishanet:
    external: true
    name: aishacrm_aishanet-staging
