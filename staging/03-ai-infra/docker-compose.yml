# Staging — Group 3: ai-infra
# Services: aishacrm-litellm, aishacrm-ollama
#
# Both stay internal — no host port, no Traefik route. Only the staging backend
# (group 1) needs to reach them, and it does so via the staging-aishanet network.
#
# Ollama is heavy (model pull at first boot). Pin to small models to keep staging fast.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: staging-aishacrm-ollama
    restart: unless-stopped
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"
    environment:
      - OLLAMA_NUM_CTX=1024
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - staging_ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - staging-aishanet

  litellm:
    # Path B: build locally from OneDev source. litellm/Dockerfile bakes
    # litellm_config.yaml into /app/config.yaml so no bind mount needed.
    image: aishacrm-litellm:${LITELLM_IMAGE_TAG:-staging}
    build:
      context: ../..
      dockerfile: litellm/Dockerfile
    container_name: staging-aishacrm-litellm
    restart: unless-stopped
    environment:
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      - DOPPLER_PROJECT=${DOPPLER_PROJECT:-aishacrm}
      - DOPPLER_CONFIG=${DOPPLER_CONFIG:-stg_stg}
    # No bind mount — /app/config.yaml is baked into the image via
    # litellm/Dockerfile (`COPY litellm_config.yaml /app/config.yaml`).
    # Reason: Coolify v4 in this deployment mode renders only the compose file
    # to <app_dir>/docker-compose.yaml without cloning the repo tree, so any
    # bind source pointing at a repo file resolves to a non-existent path and
    # Docker auto-creates an empty directory there, crashing litellm with
    # IsADirectoryError. To change config: edit litellm_config.yaml at repo
    # root and push a new vX.Y.Z tag — docker-release.yml rebuilds the image.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - staging-aishanet

volumes:
  staging_ollama_data:
    driver: local

networks:
  staging-aishanet:
    name: staging-aishanet
    external: true
