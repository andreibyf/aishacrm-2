<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiSHA AI Activity Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    h1 { margin-bottom: 20px; color: #38bdf8; }
    .filters { 
      background: #1e293b; 
      padding: 20px; 
      border-radius: 8px; 
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .filter-group { display: flex; flex-direction: column; }
    label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
    select, input { 
      padding: 8px; 
      border-radius: 6px; 
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #2563eb; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid #3b82f6;
    }
    .stat-label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #38bdf8; }
    .logs-table {
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #0f172a;
      padding: 12px;
      text-align: left;
      font-size: 12px;
      color: #94a3b8;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    td {
      padding: 12px;
      border-top: 1px solid #334155;
      font-size: 13px;
    }
    tr:hover { background: #334155; }
    .status-success { color: #10b981; }
    .status-error { color: #ef4444; }
    .status-failover { color: #f59e0b; }
    .provider-openai { color: #10b981; }
    .provider-anthropic { color: #a78bfa; }
    .provider-groq { color: #f97316; }
    .tools { 
      font-size: 11px; 
      color: #64748b; 
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    .error {
      background: #dc2626;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AiSHA AI Activity Monitor</h1>
    
    <div class="filters">
      <div class="filter-group">
        <label>Time Range</label>
        <select id="timeRange">
          <option value="1">Last 1 hour</option>
          <option value="6">Last 6 hours</option>
          <option value="24" selected>Last 24 hours</option>
          <option value="168">Last 7 days</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Provider</label>
        <select id="provider">
          <option value="">All</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="groq">Groq</option>
          <option value="local">Local</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="status">
          <option value="">All</option>
          <option value="success">Success</option>
          <option value="error">Error</option>
          <option value="failover">Failover</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Capability</label>
        <select id="capability">
          <option value="">All</option>
          <option value="chat_tools">Chat Tools</option>
          <option value="json_strict">JSON Strict</option>
          <option value="streaming">Streaming</option>
        </select>
      </div>
      <div class="filter-group">
        <label>&nbsp;</label>
        <button onclick="loadLogs()">🔍 Refresh</button>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">Total Calls</div>
        <div class="stat-value" id="totalCalls">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Duration</div>
        <div class="stat-value" id="avgDuration">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Tokens</div>
        <div class="stat-value" id="totalTokens">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Error Rate</div>
        <div class="stat-value" id="errorRate">-</div>
      </div>
    </div>

    <div id="errorMessage"></div>
    <div id="loading" class="loading" style="display:none;">Loading...</div>

    <div class="logs-table">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Provider</th>
            <th>Model</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Tokens</th>
            <th>Tools</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="logsBody">
          <tr><td colspan="8" class="loading">No data loaded. Click Refresh.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    async function loadLogs() {
      const timeRange = document.getElementById('timeRange').value;
      const provider = document.getElementById('provider').value;
      const status = document.getElementById('status').value;
      const capability = document.getElementById('capability').value;

      const params = new URLSearchParams({
        hours: timeRange,
        ...(provider && { provider }),
        ...(status && { status }),
        ...(capability && { capability }),
      });

      document.getElementById('loading').style.display = 'block';
      document.getElementById('errorMessage').innerHTML = '';

      try {
        const response = await fetch(`${API_URL}/api/logs?${params}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        renderLogs(data.logs);
        renderStats(data.stats);
      } catch (err) {
        document.getElementById('errorMessage').innerHTML = 
          `<div class="error">Failed to load logs: ${err.message}</div>`;
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderLogs(logs) {
      const tbody = document.getElementById('logsBody');
      if (!logs || logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="loading">No logs found</td></tr>';
        return;
      }

      tbody.innerHTML = logs.map(log => `
        <tr>
          <td>${new Date(log.created_at).toLocaleString()}</td>
          <td class="provider-${log.provider}">${log.provider}</td>
          <td>${log.model}</td>
          <td class="status-${log.status}">${log.status}</td>
          <td>${log.duration_ms ? `${log.duration_ms}ms` : '-'}</td>
          <td>${log.usage?.total_tokens || '-'}</td>
          <td class="tools">${log.tools_called?.join(', ') || '-'}</td>
          <td>${log.error ? `<span style="color:#ef4444">${log.error.substring(0, 50)}...</span>` : '-'}</td>
        </tr>
      `).join('');
    }

    function renderStats(stats) {
      if (!stats) return;
      document.getElementById('totalCalls').textContent = stats.total_calls || 0;
      document.getElementById('avgDuration').textContent = 
        stats.avg_duration ? `${Math.round(stats.avg_duration)}ms` : '-';
      document.getElementById('totalTokens').textContent = 
        stats.total_tokens ? stats.total_tokens.toLocaleString() : '-';
      document.getElementById('errorRate').textContent = 
        stats.error_rate ? `${(stats.error_rate * 100).toFixed(1)}%` : '0%';
    }

    // Auto-refresh every 30 seconds
    setInterval(loadLogs, 30000);
  </script>
</body>
</html>
