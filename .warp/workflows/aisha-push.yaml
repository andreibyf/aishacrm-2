---
name: aisha push
description: Stage + commit (--no-verify) + push to github main. Use for cleanup/docs/config commits where the pre-commit hook would fail on unrelated tests.
arguments:
  - name: msg
    description: Commit message (one line; use quotes for multi-word)
command: 'cd ${AISHA_REPO} && git add -A && git status -s && git commit --no-verify -m "{{msg}}" && git push github main'
tags: [aisha, git, deploy]
