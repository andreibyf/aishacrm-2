# systemd drop-in for system.slice CPU cap.
#
# Origin: 2026-05-06 VPS-1 lockup investigation. system.slice processes
# (dockerd, containerd, snapd, journald, cloudflared, kworker threads)
# cumulatively consumed ~8 cores on a Zap VPS with a hypervisor-enforced
# 5.5-core hard cap, causing Zap to LOCK the VM after sustained over-cap
# usage. Direct /proc/stat measurement before this cap: 821% of one core
# (149% of Zap's 5.5-core cap). After: 396% of one core (71% of cap).
#
# Combined with aishacrm.slice (400%) and coolify.slice (100%), the realized
# CPU is bounded by Zap's 550% physical cap; the kernel scheduler arbitrates
# between slices when total demand exceeds physical capacity.
#
# Install (as root, on VPS-1):
#   sudo mkdir -p /etc/systemd/system/system.slice.d
#   sudo cp scripts/system-slice-cap.conf /etc/systemd/system/system.slice.d/10-aisha-cap.conf
#   sudo systemctl daemon-reload
#
# Verify:
#   systemctl show system.slice -p CPUQuotaPerSecUSec
#   # should show CPUQuotaPerSecUSec=4s
[Slice]
CPUQuota=400%
CPUAccounting=yes
